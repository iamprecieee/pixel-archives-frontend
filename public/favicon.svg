<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark maroon background -->
  <rect width="32" height="32" rx="4" fill="#A93838"/>
  
  <!-- Pixel grid - 4x4 colorful pixels (centered) -->
  <rect x="8" y="8" width="4" height="4" fill="#00BFFF"/>
  <rect x="12" y="8" width="4" height="4" fill="#F5F5DC"/>
  <rect x="16" y="8" width="4" height="4" fill="#7FFF00"/>
  <rect x="20" y="8" width="4" height="4" fill="#FF69B4"/>
  
  <rect x="8" y="12" width="4" height="4" fill="#FFD700"/>
  <rect x="12" y="12" width="4" height="4" fill="#9400D3"/>
  <rect x="16" y="12" width="4" height="4" fill="#00FFFF"/>
  <rect x="20" y="12" width="4" height="4" fill="#FF4500"/>
  
  <rect x="8" y="16" width="4" height="4" fill="#32CD32"/>
  <rect x="12" y="16" width="4" height="4" fill="#FF1493"/>
  <rect x="16" y="16" width="4" height="4" fill="#1E90FF"/>
  <rect x="20" y="16" width="4" height="4" fill="#FFFF00"/>
  
  <rect x="8" y="20" width="4" height="4" fill="#DA70D6"/>
  <rect x="12" y="20" width="4" height="4" fill="#00FF00"/>
  <rect x="16" y="20" width="4" height="4" fill="#FFA500"/>
  <rect x="20" y="20" width="4" height="4" fill="#00CED1"/>
</svg>
